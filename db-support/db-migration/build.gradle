dependencies {
  annotationProcessor rootProject.deps.lombok
  compileOnly rootProject.deps.lombok

  implementation rootProject.deps.commonsLang3
  implementation rootProject.deps.gson
  implementation rootProject.deps.jakartaAnnotation
  compileOnly rootProject.deps.jetBrainsAnnotations

  implementation(rootProject.deps.liquibase) {
    // Not needed, according to https://github.com/liquibase/liquibase/issues/1866
    exclude group: 'javax.xml.bind', module: 'jaxb-api'

    // These dependencies used to be shaded, but are now directly added. However they seem only related to use of
    // CSV or YAML snapshots/changelogs and/or offline storage which does not seem relevant to GoCD.
    exclude group: 'org.yaml', module: 'snakeyaml'
    exclude group: 'com.opencsv', module: 'opencsv'
  }
  implementation rootProject.deps.slf4jApi
  runtimeOnly rootProject.deps.liquibaseSlf4j

  testImplementation rootProject.deps.junit5Api
  testRuntimeOnly rootProject.deps.junit5Engine
  testRuntimeOnly rootProject.deps.junit5PlatformLauncher
  testImplementation rootProject.deps.assertJ
  testImplementation rootProject.deps.mockitoCore
  testImplementation rootProject.deps.mockitoJunit5

  testImplementation rootProject.deps.commonsDbcp
  testImplementation rootProject.deps.h2
  testRuntimeOnly project(':db-support:db-support-h2')

  testFixturesApi rootProject.deps.testcontainersJdbc
  testFixturesImplementation rootProject.deps.assertJ_DB
  testFixturesImplementation rootProject.deps.assertJ
  testFixturesRuntimeOnly rootProject.deps.logback
}
