description = 'GoCD Jetty Bootstrapper'

dependencies {
  implementation project(':base')
  implementation project(':app-server')
  implementation rootProject.deps.slf4jApi

  compileOnly rootProject.deps.jetty
  compileOnly rootProject.deps.jettyJmx
  compileOnly rootProject.deps.jettyServlets
  compileOnly rootProject.deps.jettyUtil
  compileOnly rootProject.deps.jettyDeploy
  compileOnly rootProject.deps.jettyWebsocket

  testImplementation rootProject.deps.jettyDeploy
  testImplementation rootProject.deps.jettyJmx
  testImplementation rootProject.deps.jettyWebsocket
  testImplementation(testFixtures(project(':test:test-utils')))
  testImplementation rootProject.deps.junit5Api
  testImplementation rootProject.deps.junit5Params
  testImplementation rootProject.deps.mockitoCore
  testImplementation rootProject.deps.mockitoJunit5
  testRuntimeOnly rootProject.deps.junit5Engine
  testRuntimeOnly rootProject.deps.junit5PlatformLauncher
  testImplementation rootProject.deps.assertJ
  testImplementation rootProject.deps.systemStubs
}
