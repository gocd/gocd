description = 'GoCD Server used for development'

configurations {
  copyOnly {
    transitive = false
  }
}

dependencies {
  testFixturesImplementation project(':server')
  testFixturesImplementation project(':base')
  testFixturesRuntimeOnly findProject(':api').subprojects.collect { project(it.path) }
  testFixturesRuntimeOnly findProject(':spark').subprojects.collect { project(it.path) }
  testFixturesRuntimeOnly rootProject.deps.jetty
  testFixturesRuntimeOnly rootProject.deps.jettyJmx
  testFixturesRuntimeOnly rootProject.deps.jettyServlets
  testFixturesRuntimeOnly rootProject.deps.jettyUtil
  testFixturesRuntimeOnly rootProject.deps.jettyDeploy
  testFixturesRuntimeOnly rootProject.deps.jettyWebsocket

  testFixturesRuntimeOnly(rootProject.deps.jgitServer) {
    exclude(module: 'jsch')
    exclude(module: 'jzlib')
  }
  testFixturesRuntimeOnly project(':jetty')
  testFixturesImplementation rootProject.deps.servletApi
  testFixturesImplementation rootProject.deps.slf4jApi

  copyOnly project(path: ':tw-go-plugins', configuration: 'pluginsZipConfig')
  copyOnly project(':plugin-infra:go-plugin-activator')
}

def generatedResourcesOutput = file("resources-generated")

sourceSets {
  testFixtures {
    resources {
      output.dir generatedResourcesOutput, builtBy: 'generateResources'
      srcDirs += generatedResourcesOutput
    }
  }
}

clean {
  delete(generatedResourcesOutput)
}

tasks.register('generateResources', Copy) {
  dependsOn configurations.copyOnly
  outputs.dir(generatedResourcesOutput)

  into generatedResourcesOutput
  from({ configurations.copyOnly }) {
    rename "(.*)-${project.version}.(jar|zip)", '$1.$2'
  }
}
checkLicenseTestFixtures.dependsOn generateResources
processTestFixturesResources.dependsOn generateResources

tasks.register('prepare') {
  dependsOn generateResources
}
