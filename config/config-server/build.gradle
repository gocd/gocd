description = 'API to configure/access cruise-config.xml'

dependencies {
  implementation project(':config:config-api')
  implementation project(':common')
  implementation project(':domain')
  implementation project(':util')
  implementation(rootProject.deps.jgit) {
    exclude(group: 'org.apache.httpcomponents')
    exclude(module: 'jsch')
    exclude(module: 'jzlib')
  }
  implementation rootProject.deps.springContext
  implementation rootProject.deps.slf4jApi
  implementation rootProject.deps.caffeine
  implementation rootProject.deps.commonsIO
  implementation rootProject.deps.commonsLang3
  implementation rootProject.deps.commonsText
  implementation rootProject.deps.cloning
  implementation rootProject.deps.jakartaAnnotation
  api rootProject.deps.jdom
  if (rootProject.deps.jdom) {
    // Required for use of org.jdom2.xpath.XPathFactory where jaxen is the default impl
    runtimeOnly rootProject.deps.jaxen
  }
  compileOnly rootProject.deps.jetBrainsAnnotations
  annotationProcessor rootProject.deps.lombok
  compileOnly rootProject.deps.lombok

  testImplementation project(":plugin-infra:go-plugin-infra")
  testImplementation(testFixtures(project(":config:config-api")))
  testImplementation(testFixtures(project(":domain")))
  testImplementation(testFixtures(project(':test:test-utils')))
  testImplementation rootProject.deps.junit5Api
  testImplementation rootProject.deps.assertJ
  testImplementation rootProject.deps.xmlUnit
  testRuntimeOnly rootProject.deps.junit5Engine
  testRuntimeOnly rootProject.deps.junit5PlatformLauncher
  testImplementation rootProject.deps.mockitoJunit5

  testFixturesApi(project(':config:config-api')) {
    capabilities { requireFeature('server-only') }
  }
  testFixturesImplementation project(':base')
  testFixturesImplementation project(':util')
  testFixturesApi rootProject.deps.assertJ
}

test {
  systemProperty('go.enforce.server.immutability', 'N')
}

clean {
  delete 'config'
}
