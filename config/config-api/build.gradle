description = 'GoCD Config API'

java {
  // For use of server-only plugins
  registerFeature('serverOnly') {
    usingSourceSet(sourceSets.create('serverOnly'))
  }
}
CapabilitySupport.extendMain(project, 'serverOnly')

dependencies {
  api project(':base')
  api project(':db')
  implementation project(':util')
  api project(':plugin-infra:plugin-metadata-store')
  implementation project(':plugin-infra:go-plugin-domain')
  implementation project(':plugin-infra:go-plugin-api')
  implementation rootProject.deps.jakartaAnnotation

  implementation rootProject.deps.gson
  api rootProject.deps.jdom
  implementation rootProject.deps.commonsCodec
  implementation rootProject.deps.commonsIO
  implementation rootProject.deps.commonsText
  implementation rootProject.deps.commonsLang3
  serverOnlyImplementation rootProject.deps.quartz
  serverOnlyImplementation platform(project(':build-platform'))
  implementation rootProject.deps.cloning
  implementation(rootProject.deps.apacheHttpComponents) {
    exclude(module: 'commons-codec')
  }
  implementation rootProject.deps.springWeb
  if (rootProject.deps.springWeb || rootProject.deps.apacheHttpComponents) {
    runtimeOnly rootProject.deps.slf4jJcl // Allow commons-logging replacement
  }
  implementation rootProject.deps.slf4jApi
  annotationProcessor rootProject.deps.lombok
  compileOnly rootProject.deps.lombok
  compileOnlyApi rootProject.deps.jetBrainsAnnotations

  testImplementation rootProject.deps.junit5Api
  testRuntimeOnly rootProject.deps.junit5Engine
  testRuntimeOnly rootProject.deps.junit5PlatformLauncher
  testImplementation rootProject.deps.mockitoCore
  testImplementation rootProject.deps.junit5Params
  testImplementation rootProject.deps.assertJ
  testImplementation rootProject.deps.systemStubs
  testImplementation(testFixtures(project(':test:test-utils')))

  testFixturesApi rootProject.deps.junit5Api
  testFixturesImplementation project(':util')
  testFixturesImplementation(testFixtures(project(':test:test-utils')))
}
