  // Files we don't want headers on
  exclude('**/*.html', '**/images', '**/*.svg', '**/*.json', '**/*.gz', '**/.*', '**/bin', '**/*.yml*', '**/*.key',
    '**/*.ejs', '**/Rakefile', '**/Gemfile*', '**/*.lock', '**/*.toml')

  // generated code | libs | output
