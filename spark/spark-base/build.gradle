plugins {
  id 'groovy'
}

dependencies {
  implementation project(':app-server')
  implementation project(':server')
  implementation project(':config:config-api')

  implementation rootProject.deps.commonsText
  implementation rootProject.deps.gson
  implementation platform(rootProject.deps.jacksonBom)
  implementation rootProject.deps.jacksonCore
  api rootProject.deps.jacksonDatabind
  implementation rootProject.deps.springWeb
  if (rootProject.deps.springWeb) {
    runtimeOnly rootProject.deps.slf4jJcl // Allow commons-logging replacement
  }

  api(rootProject.deps.spark) {
    exclude(group: 'org.eclipse.jetty')
    exclude(group: 'org.eclipse.jetty.websocket')
  }
  api rootProject.deps.servletApi

  testImplementation localGroovy()

  testImplementation rootProject.deps.junit5Api
  testImplementation rootProject.deps.junit5Params
  testRuntimeOnly rootProject.deps.junit5Engine
  testRuntimeOnly rootProject.deps.junit5PlatformLauncher

  testImplementation rootProject.deps.mockitoCore
  testImplementation rootProject.deps.mockitoJunit5
  testImplementation rootProject.deps.assertJ

  testRuntimeOnly project(':jetty')

  testFixturesImplementation localGroovy()
  testFixturesApi(rootProject.deps.spark) {
    exclude(group: 'org.eclipse.jetty')
    exclude(group: 'org.eclipse.jetty.websocket')
  }
  testFixturesApi rootProject.deps.servletApi
  testFixturesApi(testFixtures(project(':test:http-mocks')))
  testFixturesApi rootProject.deps.springTest
  testFixturesImplementation project(':server')

  testFixturesApi rootProject.deps.junit5Api
  testFixturesImplementation rootProject.deps.mockitoCore
  testFixturesImplementation rootProject.deps.jsonUnit
}
