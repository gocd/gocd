        "urlrewritefilter-${rootProject.versions.urlrewrite}.jar",
        "util-${project.version}.jar",
        "zt-exec-${rootProject.versions.ztExec}.jar",
      ])
  ] as Map<String, List<String>>

  doLast {
    def denylistedContents = [
      'WEB-INF/rails/gems/jruby/*/extensions/**': 'should not contain ruby extensions'
    ]

    def denylistedErrors = []
    denylistedContents.each {denylist ->
      archiveOps.zipTree(jar).matching {
        include denylist.key
      }.visit { element ->
        if (!element.directory) denylistedErrors << "war ${denylist.value}: ${element.relativePath.pathString}"
      }
    }

    if (!denylistedErrors.empty) {
      throw new IllegalStateException(denylistedErrors.join(System.lineSeparator()))
    }
  }
}

tasks.register('licenseReportAggregate') {
  def licenseReportTasks = rootProject.subprojects.collectMany { prj -> prj.tasks.withType(ReportTask) }

  dependsOn(licenseReportTasks)
  licenseReportTasks.each { rt -> inputs.dir(rt.outputFolder) }

  dependsOn compileAssetsWebpackProd
  dependsOn generateRubygemsLicenseReport

  def rubygemsReportFile = (generateRubygemsLicenseReport as Task).outputs.files.singleFile
  def extraJavascriptLicenses = project.file("${project.railsRoot}/app/assets/javascripts/lib/_licenses.json")
  def yarnLicenseReportDir = (compileAssetsWebpackProd as Task).outputs.files.find { f -> f.name == 'yarn-license-prod' } as File
  def goVersions = rootProject.goVersions as GoVersions
  inputs.file(rubygemsReportFile)
  inputs.file(extraJavascriptLicenses)
  inputs.dir(yarnLicenseReportDir)
  inputs.property('goVersions', goVersions)

  def licenseReportAggregateOutputDir = layout.getBuildDirectory().dir('reports/license-report-aggregate') as Provider<Directory>
  outputs.dir(licenseReportAggregateOutputDir)

  def missingJarDependencyLicenses = [
    [
      moduleName    : 'net.sf.ehcache.internal:ehcache-core',
      moduleVersion : rootProject.versions.ehcache,
      moduleUrls    : [
        "https://www.ehcache.org/"
      ],
      moduleLicenses: [
        [
          moduleLicense   : 'Apache-2.0',
          moduleLicenseUrl: "https://spdx.org/licenses/Apache-2.0.html"
        ]
      ]
    ],
    [
      moduleName    : 'antlr:antlr',
      moduleVersion : '2.7.6',
      moduleUrls    : [
        "https://www.antlr.org"
      ],
      moduleLicenses: [
        [
          moduleLicense   : 'BSD-3-Clause',
          moduleLicenseUrl: "https://spdx.org/licenses/BSD-3-Clause.html"
        ]
      ]
    ],
    [
      moduleName    : 'com.bazaarvoice.jolt:jolt-core',
      moduleVersion : rootProject.versions.jolt,
      moduleUrls    : [
        "https://github.com/bazaarvoice/jolt"
      ],
      moduleLicenses: [
        [
          moduleLicense   : 'Apache-2.0',
          moduleLicenseUrl: "https://spdx.org/licenses/Apache-2.0.html"
        ]
      ]
    ],
    [
      moduleName    : 'com.bazaarvoice.jolt:json-utils',
      moduleVersion : rootProject.versions.jolt,
      moduleUrls    : [
        "https://github.com/bazaarvoice/jolt"
      ],
      moduleLicenses: [
        [
          moduleLicense   : 'Apache-2.0',
          moduleLicenseUrl: "https://spdx.org/licenses/Apache-2.0.html"
        ]
      ]
    ],
    [
      moduleName    : ':com.microsoft.tfs.sdk',
      moduleVersion : rootProject.versions.tfsSdk,
      moduleUrls    : [
        "https://github.com/Microsoft/team-explorer-everywhere"
      ],
      moduleLicenses: [
        [
          moduleLicense   : 'MIT',
          moduleLicenseUrl: "https://spdx.org/licenses/MIT.html"
        ]
      ]
    ],
    [
      moduleName    : 'org.hibernate.javax.persistence:hibernate-jpa-2.0-api',
      moduleVersion : '1.0.1.Final',
      moduleUrls    : [
        "https://hibernate.org"
      ],
      moduleLicenses: [
        [
          moduleLicense   : 'BSD-3-Clause',
          moduleLicenseUrl: "https://www.eclipse.org/org/documents/edl-v10.php"
        ]
      ]
    ],
    [
      moduleName    : 'jaxen:jaxen',
      moduleVersion : rootProject.versions.jaxen,
      moduleUrls    : [
        "http://www.cafeconleche.org/jaxen/"
      ],
      moduleLicenses: [
        [
          // License is automatically detected as 0BSD by gradle-license-report, but appears to actually be BSD-3-Clause in nature
          moduleLicense   : 'BSD-3-Clause',
          moduleLicenseUrl: "https://spdx.org/licenses/BSD-3-Clause.html"
        ]
      ]
    ],
  ]

  def getJarDependencyLicenses = {
    // get a list of all dependencies from each gradle module

    def allReportJarDependencies = licenseReportTasks.inject(new LinkedHashSet<Map<String, Object>>(), { result, rt ->
      def file = new File(rt.outputFolder, 'index.json')
      if (!file.exists()) return result

      def json = new JsonSlurper().parse(file) as Map<String, Object>
      if (json.dependencies != null) {
        result.addAll(json.dependencies as List<Map<String, Object>>)
      }
      return result
    })

    // remove items that we know to have missing license data
    allReportJarDependencies.removeIf { eachDependency ->
      missingJarDependencyLicenses.any { dependencyWithMissingLicenseData ->
        eachDependency.moduleName == dependencyWithMissingLicenseData.moduleName && eachDependency.moduleVersion == dependencyWithMissingLicenseData.moduleVersion
      }
    }

    // then add the missing license data
    allReportJarDependencies.addAll(missingJarDependencyLicenses)

    allReportJarDependencies
  }

  def getLicenseDataFor = { Set<String> allJars, Set<Map<String, Object>> allDependenciesInReport ->
    allJars.inject(new LinkedHashMap<String, Map<String, Object>>(), { result, eachPackagedJar ->
      Map<String, Object> module = allDependenciesInReport.find { Map<String, Object> eachDependencyInReport ->
        def (_, artifactId) = (eachDependencyInReport.moduleName as String).split(':')
        def version = eachDependencyInReport.moduleVersion
        eachPackagedJar =~ /^${artifactId}-${version}(-.+)?\.jar/
      }

      if (module == null) {
        throw new GradleException("Expected to find packaged jar ${eachPackagedJar} but was not found in the license report")
      }

      result.put(module.moduleName as String, module)
      result
    })
  }

  def goCDJarsWithoutLicenses = ['agent-launcher.jar',
                                 'agent.jar',
                                 'go-plugin-activator.jar',
                                 'tfs-impl-14.jar',
                                 'gocd-json-config-plugin.jar',
                                 'gocd-yaml-config-plugin.jar',
                                 'gocd-filebased-authentication-plugin.jar',
                                 'gocd-ldap-authentication-plugin.jar',
                                 'gocd-file-based-secrets-plugin.jar']

  def injected = project.objects.newInstance(Injected)
  doFirst {
    LinkedHashSet<Map<String, Object>> allJarDependencyLicenses = getJarDependencyLicenses()

    List<VerifyJarTask> verifyJarTasks = rootProject.subprojects.collectMany { eachProject ->
      eachProject.tasks.withType(VerifyJarTask)
    }

    // list of all jars that we package
    Set<String> allJars = verifyJarTasks.collectMany { VerifyJarTask eachTask ->
      eachTask.expectedJars.values().flatten()
    }.collect { name -> name.toString() }.sort().unique()

    // remove unwanted stuff, mostly nested zip files and jars with GoCD package version
    allJars.removeIf { name -> name.endsWith(".zip") || name.endsWith("-${version}.jar") || name.contains("-${version}-") }
    allJars.removeAll(goCDJarsWithoutLicenses)

    // get the licenses corresponding to the jars we actually package.
    def licensesForPackagedJarDependencies = getLicenseDataFor(allJars, allJarDependencyLicenses) as Map<String, Map<String, Object>>

    delete(licenseReportAggregateOutputDir)
    licenseReportAggregateOutputDir.get().asFile.mkdirs()

    def licenseReport = new LicenseReport(
      injected.fileOps, injected.objectFactory,
      licenseReportTasks, licenseReportAggregateOutputDir, licensesForPackagedJarDependencies,
      [ Ruby: rubygemsReportFile, Javascript: extraJavascriptLicenses ], new File(yarnLicenseReportDir, 'license-report.json'), goVersions)
    licenseReport.generate()
  }
}

